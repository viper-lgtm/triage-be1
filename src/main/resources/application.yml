server:
  port: 8081
spring:
  application:
    name: triage-be1

  redis:
    host: localhost
    port: 6379
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 0ms
  cache:
    type: redis
  datasource:
    url: jdbc:postgresql://localhost:5434/triage_be1
    username: triage
    password: triage
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  enabled: true
  be2:
    base-url: http://localhost:8082